{% extends "base.html" %}
{% block title %}Login – TransRoute{% endblock %}
{% block nav %}{% endblock %}
{% block content %}
<div style="display:flex; justify-content:center; align-items:center; min-height:80vh">
  <div class="card" style="width: 100%; max-width: 400px; padding: 40px">
    <div style="text-align:center; margin-bottom: 30px">
      <div style="font-size: 40px; margin-bottom: 10px">🚌</div>
      <h1 style="color:var(--text-main); font-size: 24px">TransRoute Planner</h1>
      <p style="color:var(--text-sec); font-size: 14px">Please sign in to access the system</p>
    </div>
    
    <div class="form-group full" style="margin-bottom: 16px">
      <label style="font-weight:600">Username</label>
      <input type="text" id="username" placeholder="Enter your username" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px">
    </div>
    
    <div class="form-group full" style="margin-bottom: 24px">
      <label style="font-weight:600">Password</label>
      <input type="password" id="password" placeholder="Enter your password" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px">
    </div>
    
    <button class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px" onclick="login()">Login to Dashboard</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  if (!user || !pass) {
    return toast('Please enter username and password', 'error');
  }
  
  // For the DB project requirements, any login is accepted.
  // We simply redirect to the dashboard.
  toast('Login successful! Redirecting...');
  setTimeout(() => {
    window.location.href = '/dashboard';
  }, 800);
}
</script>
{% endblock %}
