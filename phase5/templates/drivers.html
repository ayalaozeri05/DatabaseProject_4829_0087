{% extends "base.html" %}
{% block title %}Drivers – TransRoute{% endblock %}
{% block content %}
<div class="page-header"><h1>🧑‍✈️ Drivers Management</h1><p>Manage driver roster and schedules</p></div>

<div class="toolbar">
  <div class="toolbar-search"><input id="search" placeholder="Search name, phone, or license…" oninput="filterTable()"></div>
  <div class="toolbar-sep"></div>
  <button class="btn btn-success" onclick="openAdd()">＋ Add Driver</button>
  <button class="btn btn-primary" onclick="openEdit()">✏️ Edit</button>
  <button class="btn btn-danger"  onclick="deleteRow()">🗑 Delete</button>
  <button class="btn btn-ghost"   onclick="loadData()">🔄 Refresh</button>
</div>

<div class="two-pane">
  <div class="card"><div id="table-wrap"></div></div>

  <div class="card">
    <div class="card-header"><h2>🧑‍✈️ Driver Detail</h2></div>
    <div class="card-body" id="detail-panel">
      <div class="no-data" style="padding:40px 0">Select a driver to view details</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Driver</h3>
      <button class="modal-close" onclick="closeModal('modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id">
      <div class="form-grid">
        <div class="form-group full"><label>Full Name *</label><input id="f-name" placeholder="Full Name"></div>
        <div class="form-group"><label>License Type</label><input id="f-lic" placeholder="e.g. B, C"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal')">Cancel</button>
      <button class="btn btn-success" onclick="save()">💾 Save</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let rows=[], selectedId=null;

async function loadData() {
  rows = await api('/api/drivers');
  renderTable(rows);
}

function renderTable(data) {
  const cols = [
    {key:'driver_fullname', label:'Full Name'},
    {key:'licensetype', label:'License Type'},
    {key:'total_trips', label:'Total Trips'},
    {key:'upcoming', label:'Upcoming Trips'},
  ];
  document.getElementById('table-wrap').innerHTML = buildTable(data, cols);
  document.querySelectorAll('#table-wrap tbody tr').forEach((tr,i) => {
    tr.addEventListener('click', () => {
      document.querySelectorAll('#table-wrap tbody tr').forEach(r=>r.classList.remove('selected'));
      tr.classList.add('selected'); selectedId=data[i].driver_id; loadDetail(data[i]);
    });
  });
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  renderTable(rows.filter(r =>
    (r.driver_fullname||'').toLowerCase().includes(q) ||
    (r.licensetype||'').toLowerCase().includes(q)
  ));
}

async function loadDetail(driver) {
  const trips = await api('/api/trips');
  const myTrips = trips.filter(t => t.driver_name === driver.driver_fullname).slice(0,8);
  let html = `
    <div class="info-row"><span class="info-label">Name</span><span class="info-value">${driver.driver_fullname}</span></div>
    <div class="info-row"><span class="info-label">License Type</span><span class="info-value">${driver.licensetype||'—'}</span></div>
    <div class="info-row"><span class="info-label">Total Trips</span><span class="info-value">${driver.total_trips}</span></div>
    <div class="info-row"><span class="info-label">Upcoming Trips</span><span class="info-value" style="color:var(--accent)">${driver.upcoming}</span></div>
    <div style="margin-top:16px;font-size:12px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.4px">Upcoming Schedule</div>
  `;
  if (myTrips.length) {
    myTrips.forEach(t => {
      html += `<div class="info-row"><span class="info-label">${t.trip_date}</span><span class="info-value">${t.route_name} @ ${(t.departure_time||'').slice(0,5)}</span></div>`;
    });
  } else { html += '<div style="color:var(--text-hint);font-size:13px;margin-top:8px">No upcoming trips</div>'; }
  document.getElementById('detail-panel').innerHTML = html;
}

function openAdd() {
  selectedId=null;
  document.getElementById('modal-title').textContent='Add Driver';
  ['f-id','f-name','f-lic'].forEach(id=>document.getElementById(id).value='');
  openModal('modal');
}

async function openEdit() {
  const inputId = prompt("Enter the Driver ID to edit:", selectedId || "");
  if (!inputId) return;
  try {
    const r = await api(`/api/drivers/${inputId}`);
    document.getElementById('modal-title').textContent='Edit Driver';
    document.getElementById('f-id').value   = r.driver_id;
    document.getElementById('f-name').value = r.driver_fullname;
    document.getElementById('f-lic').value  = r.licensetype||'';
    openModal('modal');
  } catch(e) { toast(e.message || 'Driver not found', 'error'); }
}

async function save() {
  const body = {
    driver_fullname: document.getElementById('f-name').value.trim(),
    licensetype:  document.getElementById('f-lic').value.trim(),
  };
  if (!body.driver_fullname) return toast('Name is required','error');
  try {
    const id = document.getElementById('f-id').value;
    if (id) await api(`/api/drivers/${id}`,'PUT',body);
    else    await api('/api/drivers','POST',body);
    toast('Driver saved!'); closeModal('modal'); loadData();
  } catch(e) { toast(e.message,'error'); }
}

async function deleteRow() {
  if (!selectedId) return toast('Select a driver first','error');
  if (!confirm('Delete this driver? Their trips will remain but driver will be unassigned.')) return;
  try { await api(`/api/drivers/${selectedId}`,'DELETE'); toast('Driver deleted'); selectedId=null; loadData(); }
  catch(e) { toast(e.message,'error'); }
}

loadData();
</script>
{% endblock %}
