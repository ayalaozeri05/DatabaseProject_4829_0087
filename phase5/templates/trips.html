{% extends "base.html" %}
{% block title %}Trips – TransRoute{% endblock %}
{% block content %}
<div class="page-header"><h1>🚌 Trips Management</h1><p>Schedule and manage transport trips</p></div>

<div class="toolbar">
  <div class="toolbar-search"><input id="search" placeholder="Search route or driver…" oninput="filterTable()"></div>
  <label style="font-size:12px;color:var(--text-sec);display:flex;align-items:center;gap:6px">
    <input type="checkbox" id="future-only" onchange="filterTable()"> Future only
  </label>
  <div class="toolbar-sep"></div>
  <button class="btn btn-success" onclick="openAdd()">＋ Add Trip</button>
  <button class="btn btn-primary" onclick="openEdit()">✏️ Edit</button>
  <button class="btn btn-danger"  onclick="deleteRow()">🗑 Delete</button>
  <button class="btn btn-ghost"   onclick="loadData()">🔄 Refresh</button>
</div>

<div class="card"><div id="table-wrap"></div></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Trip</h3>
      <button class="modal-close" onclick="closeModal('modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id">
      <div class="form-grid">
        <div class="form-group"><label>Date *</label><input id="f-date" type="date"></div>
        <div class="form-group"><label>Departure Time *</label><input id="f-time" type="time"></div>
        <div class="form-group full"><label>Route *</label><select id="f-route"></select></div>
        <div class="form-group full"><label>Vehicle *</label><select id="f-vehicle" onchange="onVehicleChange()"></select></div>
        <div class="form-group full"><label>Driver</label><select id="f-driver"></select></div>
        <div class="form-group"><label>Initial Booked Seats</label><input id="f-booked" type="number" min="0" value="0"></div>
        <div class="form-group"><label>Vehicle Capacity</label><input id="f-cap" readonly></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal')">Cancel</button>
      <button class="btn btn-success" onclick="save()">💾 Save</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let rows=[], selectedId=null, routes=[], vehicles=[], drivers=[];

async function loadData() {
  [rows, routes, vehicles, drivers] = await Promise.all([
    api('/api/trips'), api('/api/lookup/routes'),
    api('/api/lookup/vehicles'), api('/api/lookup/drivers')
  ]);
  renderTable(rows);
}

function renderTable(data) {
  const cols = [
    {key:'trip_date', label:'Date'},
    {key:'departure_time', label:'Time'},
    {key:'route_name', label:'Route'},
    {key:'driver_name', label:'Driver'},
    {key:'plate_number', label:'Vehicle'},
    {key:'capacity', label:'Capacity'},
    {key:'available_seats', label:'Seats Left'},
    {key:'status_text', label:'Status'},
    {key:'occupancy_pct', label:'Occupancy', render: r => occBar(r.occupancy_pct)},
  ];
  document.getElementById('table-wrap').innerHTML = buildTable(data, cols);
  document.querySelectorAll('#table-wrap tbody tr').forEach((tr,i) => {
    tr.addEventListener('click', () => { 
      document.querySelectorAll('#table-wrap tbody tr').forEach(r => r.classList.remove('selected'));
      tr.classList.add('selected'); selectedId = data[i].trip_id; 
    });
  });
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const fut = document.getElementById('future-only').checked;
  const today = new Date().toISOString().slice(0,10);
  renderTable(rows.filter(r => {
    const matchQ = (r.route_name||'').toLowerCase().includes(q) || (r.driver_name||'').toLowerCase().includes(q);
    const matchF = !fut || r.trip_date >= today;
    return matchQ && matchF;
  }));
}

function onVehicleChange() {
  const plate = document.getElementById('f-vehicle').value;
  const v = vehicles.find(x => x.plate_number === plate);
  document.getElementById('f-cap').value = v ? v.capacity : '';
}

function openAdd() {
  selectedId = null;
  document.getElementById('modal-title').textContent = 'Add Trip';
  document.getElementById('f-id').value = '';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-time').value = '08:00';
  document.getElementById('f-booked').value = 0;
  populateSelect(document.getElementById('f-route'), routes, 'route_id', 'route_name');
  populateSelect(document.getElementById('f-vehicle'), vehicles, 'plate_number', 'plate_number');
  populateSelect(document.getElementById('f-driver'), drivers, 'driver_id', 'driver_fullname', '— No Driver');
  onVehicleChange();
  openModal('modal');
}

async function openEdit() {
  const inputId = prompt("Enter the Trip ID to edit:", selectedId || "");
  if (!inputId) return;
  try {
    const r = await api(`/api/trips/${inputId}`);
    document.getElementById('modal-title').textContent = 'Edit Trip';
    document.getElementById('f-id').value   = r.trip_id;
    document.getElementById('f-date').value = r.trip_date;
    document.getElementById('f-time').value = r.departure_time ? r.departure_time.slice(0,5) : '';
    document.getElementById('f-booked').value = 0;
    populateSelect(document.getElementById('f-route'), routes, 'route_id', 'route_name');
    document.getElementById('f-route').value = r.route_id;
    populateSelect(document.getElementById('f-vehicle'), vehicles, 'plate_number', 'plate_number');
    document.getElementById('f-vehicle').value = r.plate_number;
    populateSelect(document.getElementById('f-driver'), drivers, 'driver_id', 'driver_fullname', '— No Driver');
    document.getElementById('f-driver').value = r.driver_id || '';
    onVehicleChange();
    openModal('modal');
  } catch(e) { toast(e.message || 'Trip not found', 'error'); }
}

async function save() {
  const body = {
    trip_date:       document.getElementById('f-date').value,
    departure_time:  document.getElementById('f-time').value,
    route_id:        document.getElementById('f-route').value,
    plate_number:    document.getElementById('f-vehicle').value,
    driver_id:       document.getElementById('f-driver').value || null,
    booked:          document.getElementById('f-booked').value,
  };
  if (!body.trip_date || !body.departure_time || !body.route_id || !body.plate_number)
    return toast('Date, time, route, and vehicle are required', 'error');
  try {
    const id = document.getElementById('f-id').value;
    if (id) await api(`/api/trips/${id}`, 'PUT', body);
    else    await api('/api/trips', 'POST', body);
    toast('Trip saved!'); closeModal('modal'); loadData();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteRow() {
  if (!selectedId) return toast('Select a trip first', 'error');
  if (!confirm('Delete this trip and all its registrations?')) return;
  try { await api(`/api/trips/${selectedId}`, 'DELETE'); toast('Trip deleted'); selectedId=null; loadData(); }
  catch(e) { toast(e.message, 'error'); }
}

loadData();
</script>
{% endblock %}
